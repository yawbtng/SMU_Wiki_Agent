services:
  app:
    build: .
    container_name: ultra-fast-rag-app
    ports:
      - "8501:8501"
    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:7-alpine
    container_name: ultra-fast-rag-redis
    ports:
      - "6379:6379"
